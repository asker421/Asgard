name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Verify checked-out sources
        working-directory: android
        run: |
          echo "Checked out commit: $(git rev-parse HEAD)"
          java -version
          echo "--- Gradle wrapper ---"
          cat gradle/wrapper/gradle-wrapper.properties
          echo "--- app/build.gradle.kts ---"
          sed -n '1,160p' app/build.gradle.kts
          echo "--- AndroidManifest.xml ---"
          sed -n '1,160p' app/src/main/AndroidManifest.xml

      - name: Build debug APK using repository wrapper
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: asgard-tv-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
