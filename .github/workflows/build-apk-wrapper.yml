name: Build APK Wrapper

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-wrapper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Verify checked-out build files
        working-directory: android
        run: |
          echo "Checked out commit: $(git rev-parse HEAD)"
          java -version
          sed -n '1,180p' app/build.gradle.kts
          sed -n '1,120p' build.gradle.kts
          sed -n '1,80p' gradle/wrapper/gradle-wrapper.properties
          if grep -R "BuildConfig" app/src/main/java/com/asgard/tv/MainActivity.kt; then
            echo "ERROR: MainActivity.kt still references BuildConfig. This run is not using the fixed source." >&2
            exit 1
          fi
          echo "MainActivity.kt BuildConfig check: OK"

      - name: Build debug APK using repository wrapper
        working-directory: android
        run: |
          echo "Using repository Gradle wrapper from $(pwd)/gradlew"
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: asgard-tv-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
