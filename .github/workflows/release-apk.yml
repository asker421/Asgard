name: Release APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Verify Gradle 8.10.2 wrapper
        working-directory: android
        run: |
          echo "Checked out ref: $GITHUB_REF"
          echo "Checked out sha: $(git rev-parse HEAD)"
          java -version
          cat gradle/wrapper/gradle-wrapper.properties
          grep -q "gradle-8.10.2" gradle/wrapper/gradle-wrapper.properties

      - name: Read app version
        id: version
        working-directory: android
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -1)
          VERSION_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts | head -1)
          if [ -z "$VERSION_NAME" ] || [ -z "$VERSION_CODE" ]; then
            echo "Could not read versionName/versionCode from app/build.gradle.kts" >&2
            exit 1
          fi
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug

      - name: Prepare release asset
        run: |
          mkdir -p release-assets
          cp android/app/build/outputs/apk/debug/app-debug.apk release-assets/asgard-tv-debug.apk
          ls -lh release-assets/asgard-tv-debug.apk

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: |
          set -e
          if ! git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            git tag "$TAG_NAME" "$GITHUB_SHA"
            git push origin "$TAG_NAME"
          fi

          NOTES="Asgard TV $VERSION_NAME\n\nversionCode: $VERSION_CODE\ncommit: $GITHUB_SHA\n\nAPK asset: asgard-tv-debug.apk"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/asgard-tv-debug.apk --clobber
            gh release edit "$TAG_NAME" --title "Asgard TV $TAG_NAME" --notes "$NOTES"
          else
            gh release create "$TAG_NAME" release-assets/asgard-tv-debug.apk --title "Asgard TV $TAG_NAME" --notes "$NOTES"
          fi
