name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Verify Gradle 8.10.2 wrapper
        working-directory: android
        run: |
          echo "Checked out ref: $GITHUB_REF"
          echo "Checked out sha: $(git rev-parse HEAD)"
          java -version
          cat gradle/wrapper/gradle-wrapper.properties
          grep -q "gradle-8.10.2" gradle/wrapper/gradle-wrapper.properties

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug

      - name: Prepare release asset
        run: |
          mkdir -p release-assets
          cp android/app/build/outputs/apk/debug/app-debug.apk release-assets/asgard-tv-debug.apk
          ls -lh release-assets/asgard-tv-debug.apk

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/asgard-tv-debug.apk
          name: Asgard TV ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
