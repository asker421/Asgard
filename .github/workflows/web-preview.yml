name: Web Preview

on:
  push:
    branches: [ main ]
    paths:
      - 'android/app/src/main/assets/web/**'
      - '.github/workflows/web-preview.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static web preview
        run: |
          mkdir -p preview
          cp -R android/app/src/main/assets/web/. preview/
          cat > preview/.nojekyll <<'EOF'
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: preview

      - id: deployment
        uses: actions/deploy-pages@v4
