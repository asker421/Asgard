name: Build Asgard TV APK from release archive

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode release archive
        run: |
          mkdir -p build/release
          base64 -d releases/asgard-tv-1.5-release.zip.base64 > build/release/asgard-tv-1.5-release.zip
          unzip -q build/release/asgard-tv-1.5-release.zip -d build/release

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        working-directory: build/release/asgard-tv-1.5/android
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: asgard-tv-1.5-debug-apk
          path: build/release/asgard-tv-1.5/android/app/build/outputs/apk/debug/app-debug.apk
