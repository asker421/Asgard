# Trigger note: 2026-04-30 run smoke test via dedicated bash script for ASG-QA-001.
name: Android Emulator Smoke Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/android-emulator-smoke.yml'
      - '.github/scripts/android-emulator-smoke.sh'

jobs:
  emulator-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      SMOKE_ARTIFACTS_DIR: ${{ github.workspace }}/smoke-artifacts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare smoke artifact directory
        if: always()
        shell: bash
        run: |
          mkdir -p "$SMOKE_ARTIFACTS_DIR"
          {
            echo "Smoke artifact directory prepared before build/emulator steps."
            echo "Run started at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "GitHub SHA: $GITHUB_SHA"
            echo "Workflow: $GITHUB_WORKFLOW"
          } > "$SMOKE_ARTIFACTS_DIR/README.txt"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Build debug APK with repository Gradle Wrapper
        shell: bash
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleDebug

      - name: Enable KVM for emulator acceleration
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm || true

      - name: Run emulator smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: tv_1080p
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash "$GITHUB_WORKSPACE/.github/scripts/android-emulator-smoke.sh"

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-emulator-smoke-artifacts
          path: ${{ github.workspace }}/smoke-artifacts
          if-no-files-found: warn
