name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2
      - name: Show build inputs
        working-directory: android
        run: |
          git rev-parse HEAD
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          sed -n '1,120p' app/build.gradle.kts
          sed -n '1,120p' gradle.properties
      - name: Build debug APK
        working-directory: android
        run: gradle :app:assembleDebug -Dorg.gradle.java.home=$JAVA_HOME -Pkotlin.jvm.target.validation.mode=warning
      - uses: actions/upload-artifact@v4
        with:
          name: asgard-tv-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
